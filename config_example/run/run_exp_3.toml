[id]
run_id = "Run 3"

# Data management
[data]
folder = "\\\\klient.uib.no\\FELLES\\LAB-IT\\IFT\\resfys\\FluidFlower\\FF2 25-26 masterdata fra 101\\Subset_20min_4h\\Experiment_3_subset_20min_4h"
baseline = "DSC22892.JPG"
results = "E:\\fluidflower_glass_beads\\run_exp_3\\results_develop_simplified_test"

# Selection of basline images
[data.path.baseline]
paths = ["DSC22892.JPG", "DSC22888.JPG", "DSC22887.JPG"]

# Experimental metadata
[protocols]
injection = ["./data_example/protocol_exp_3.xlsx", "injection"]
imaging = ["./data_example/protocol_exp_3.xlsx", "imaging"]
pressure_temperature = [
    "./data_example/protocol_exp_3.xlsx",
    "pressure_temperature",
]

# Calibration of color paths
[color_paths]
ignore_labels = [0, 1]       # water and top layer
resolution = 51
num_segments = 3
threshold_baseline = 0.0
threshold_calibration = 1e-5 # 1e-4 # Needs tuning (1e-5 too low).
reference_label = 5          # black - yellow transition.
data = ["phase1", "phase5"]
baseline = "baseline"
#rois = ["roi1", "roi2"]


# Calibration of color signal to mass
[color_to_mass]
data = ["calibration"]

# Denoising using a simple averaging filter.
[restoration]
method = "volume_average"
[restoration.options]
rev_size = 0.01 # meters
